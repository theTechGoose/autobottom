<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combometer Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { margin-bottom: 16px; font-size: 18px; color: #fff; }
  .layout { display: flex; gap: 24px; }
  .controls { flex: 0 0 260px; display: flex; flex-direction: column; gap: 12px; }
  label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #aaa; }
  input[type="number"], select {
    background: #16213e; border: 1px solid #333; color: #fff;
    padding: 6px 8px; font-family: monospace; font-size: 14px; border-radius: 4px;
  }
  button {
    padding: 12px; font-size: 16px; font-family: monospace; cursor: pointer;
    border: none; border-radius: 6px; font-weight: bold;
  }
  #tick-btn { background: #e94560; color: #fff; }
  #tick-btn:active { background: #c73550; }
  #reset-btn { background: #333; color: #ccc; }
  .log { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
  #events {
    background: #16213e; border: 1px solid #333; border-radius: 6px;
    padding: 12px; height: 340px; overflow-y: auto; font-size: 13px;
    display: flex; flex-direction: column-reverse;
  }
  .entry { padding: 4px 0; border-bottom: 1px solid #222; white-space: pre; }
  .entry.drop { color: #e94560; }
  .entry.tick { color: #0f3460; }
  .combo-display { font-size: 48px; text-align: center; color: #e94560; padding: 12px 0; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset-btn {
    background: #0f3460; color: #ccc; font-size: 11px; padding: 4px 8px;
    border-radius: 3px; cursor: pointer; border: none;
  }
  .preset-btn:hover { background: #1a4a8a; }
  #consumer-output {
    background: #16213e; border: 1px solid #333; border-radius: 6px;
    padding: 16px; min-height: 120px; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
    position: relative;
  }
  .tier-indicator {
    font-size: 11px; color: #666; margin-top: 4px; text-align: center;
  }
  .bank-bar-wrap {
    background: #16213e; border: 1px solid #333; border-radius: 4px;
    height: 12px; overflow: hidden;
  }
  .bank-bar-fill {
    height: 100%; background: #e94560; transition: width 0.05s linear;
    border-radius: 3px;
  }
  .bank-label { font-size: 11px; color: #666; text-align: center; }
</style>
</head>
<body>
<h1>Combometer Test</h1>
<div class="layout">
  <div class="controls">
    <div class="combo-display" id="combo-num">0</div>
    <div class="bank-bar-wrap"><div class="bank-bar-fill" id="bank-bar" style="width:0%"></div></div>
    <div class="bank-label" id="bank-label">bank: 0ms</div>
    <button id="tick-btn">TICK</button>
    <button id="reset-btn">Reset</button>
    <hr style="border-color:#333">
    <label>Consumer
      <select id="consumer-select">
        <option value="none">None</option>
        <option value="colors">Colors</option>
        <option value="scale">Scale</option>
        <option value="tone">Tone</option>
        <option value="hype">Hype Text</option>
        <option value="shake">Shake</option>
      </select>
    </label>
    <div id="consumer-output"><span style="color:#555">pick a consumer</span></div>
    <div class="tier-indicator" id="tier-label"></div>
    <hr style="border-color:#333">
    <div class="presets">
      <button class="preset-btn" data-base="3000" data-bank="0" data-max="0">Flat 3s</button>
      <button class="preset-btn" data-base="5000" data-bank="3000" data-max="15000">Time bank</button>
      <button class="preset-btn" data-base="0" data-bank="0" data-max="0">No timeout</button>
    </div>
    <label>baseMs<input type="number" id="baseMs" value="3000"></label>
    <label>bankPerEvent<input type="number" id="bankPerEvent" value="0"></label>
    <label>maxBankMs<input type="number" id="maxBankMs" value="0"></label>
  </div>
  <div class="log">
    <div id="events"></div>
  </div>
</div>

<script>
// ---- Combometer (inlined) ----
class Combometer {
  #config;
  #combo = -1;
  #bank = 0;
  #observers = new Set();
  #timer = null;
  #lastTickAt = 0;

  constructor(config) { this.#config = config; }

  get combo() { return this.#combo; }

  get bankRemaining() {
    if (this.#combo < 0 || this.#config.baseMs === 0) return 0;
    return Math.max(0, this.#bank - (Date.now() - this.#lastTickAt));
  }

  tick(data) {
    if (this.#combo >= 0 && this.#config.baseMs > 0) {
      const elapsed = Date.now() - this.#lastTickAt;
      this.#bank -= elapsed;
      if (this.#bank <= 0) {
        const from = this.#combo;
        this.#combo = -1;
        this.#bank = 0;
        this.#clearTimer();
        this.#emit({ previous: from, new: -1, data: null });
      }
    }
    const prev = this.#combo;
    this.#combo++;
    if (this.#config.baseMs > 0) {
      if (this.#combo === 0) this.#bank = this.#config.baseMs;
      else this.#bank += this.#config.bankPerEvent;
      if (this.#config.maxBankMs > 0) this.#bank = Math.min(this.#bank, this.#config.maxBankMs);
      this.#lastTickAt = Date.now();
      this.#startDrain();
    }
    this.#emit({ previous: prev, new: this.#combo, data: data ?? null });
  }

  reset() {
    const had = this.#combo;
    this.#combo = -1;
    this.#bank = 0;
    this.#clearTimer();
    if (had >= 0) this.#emit({ previous: had, new: -1, data: null });
  }

  observe(cb) {
    this.#observers.add(cb);
    return () => this.#observers.delete(cb);
  }

  consume(consumer) {
    return this.observe((e) => {
      if (e.new === -1) {
        consumer.onDrop(e);
      } else {
        const idx = Math.min(e.new, consumer.tiers.length - 1);
        consumer.tiers[idx](e);
      }
    });
  }

  destroy() { this.#clearTimer(); this.#observers.clear(); }

  #emit(e) { for (const cb of this.#observers) cb(e); }

  #startDrain() {
    this.#clearTimer();
    if (this.#bank <= 0) return;
    this.#timer = setTimeout(() => {
      this.#timer = null;
      const prev = this.#combo;
      this.#combo = -1;
      this.#bank = 0;
      this.#emit({ previous: prev, new: -1, data: null });
    }, this.#bank);
  }

  #clearTimer() {
    if (this.#timer !== null) { clearTimeout(this.#timer); this.#timer = null; }
  }
}

// ---- Audio context (lazy) ----
let audioCtx = null;
function beep(freq, ms) {
  if (!audioCtx) audioCtx = new AudioContext();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.15;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + ms / 1000);
}

// ---- 5 consumers (use { onDrop, tiers } shape) ----
const out = () => document.getElementById("consumer-output");
const tl = () => document.getElementById("tier-label");

function makeConsumer(onDrop, tiers) {
  return {
    onDrop(e) {
      onDrop(e, out());
      tl().textContent = "onDrop";
    },
    tiers: tiers.map((fn, i) => (e) => {
      fn(e, out());
      const clamped = e.new >= tiers.length;
      tl().textContent = "tier " + i + (clamped ? " (clamped)" : "");
    }),
  };
}

const consumerDefs = {
  none: null,

  colors: makeConsumer(
    (e, o) => { o.style.background = "#16213e"; o.innerHTML = "<span style='color:#e94560'>DROPPED from " + (e.previous + 1) + "</span>"; },
    [
      (e, o) => { o.style.background = "#1b3a2d"; o.innerHTML = "<span style='color:#4ade80'>1x</span>"; },
      (e, o) => { o.style.background = "#1a3350"; o.innerHTML = "<span style='color:#60a5fa'>2x</span>"; },
      (e, o) => { o.style.background = "#3b1f5e"; o.innerHTML = "<span style='color:#c084fc'>3x</span>"; },
      (e, o) => { o.style.background = "#5e1f1f"; o.innerHTML = "<span style='color:#f87171'>4x+</span>"; },
    ],
  ),

  scale: makeConsumer(
    (e, o) => { o.style.transform = "scale(1)"; o.innerHTML = "<span style='color:#e94560;font-size:14px'>dropped</span>"; },
    [
      (e, o) => { o.style.transform = "scale(1)"; o.innerHTML = "<span style='font-size:18px'>.</span>"; },
      (e, o) => { o.style.transform = "scale(1.05)"; o.innerHTML = "<span style='font-size:24px'>o</span>"; },
      (e, o) => { o.style.transform = "scale(1.1)"; o.innerHTML = "<span style='font-size:36px'>O</span>"; },
      (e, o) => { o.style.transform = "scale(1.15)"; o.innerHTML = "<span style='font-size:48px'>O!</span>"; },
      (e, o) => { o.style.transform = "scale(1.2)"; o.innerHTML = "<span style='font-size:60px'>MAX</span>"; },
    ],
  ),

  tone: makeConsumer(
    (e, o) => { beep(150, 300); o.innerHTML = "<span style='color:#e94560'>bwomm</span>"; },
    [
      (e, o) => { beep(330, 80); o.innerHTML = "330 Hz"; },
      (e, o) => { beep(440, 80); o.innerHTML = "440 Hz"; },
      (e, o) => { beep(550, 80); o.innerHTML = "550 Hz"; },
      (e, o) => { beep(660, 100); o.innerHTML = "660 Hz"; },
      (e, o) => { beep(880, 120); o.innerHTML = "880 Hz"; },
    ],
  ),

  hype: makeConsumer(
    (e, o) => { o.innerHTML = "<span style='color:#e94560'>...silence...</span>"; },
    [
      (e, o) => { o.innerHTML = "ok"; },
      (e, o) => { o.innerHTML = "nice"; },
      (e, o) => { o.innerHTML = "<b>GREAT</b>"; },
      (e, o) => { o.innerHTML = "<b style='color:#f59e0b'>AMAZING!</b>"; },
      (e, o) => { o.innerHTML = "<b style='color:#ef4444;font-size:24px'>UNSTOPPABLE!!</b>"; },
    ],
  ),

  shake: makeConsumer(
    (e, o) => { o.style.animation = "none"; o.innerHTML = "<span style='color:#e94560'>thud</span>"; },
    [
      (e, o) => { shakeEl(o, 1); o.innerHTML = "~"; },
      (e, o) => { shakeEl(o, 2); o.innerHTML = "~~"; },
      (e, o) => { shakeEl(o, 4); o.innerHTML = "~~~"; },
      (e, o) => { shakeEl(o, 7); o.innerHTML = "<b>~~~~</b>"; },
      (e, o) => { shakeEl(o, 12); o.innerHTML = "<b style='color:#ef4444'>~~~~~</b>"; },
    ],
  ),
};

function shakeEl(el, px) {
  el.style.animation = "none";
  el.offsetHeight;
  el.style.animation = "shk 0.1s " + Math.min(px, 6) + " linear";
  el.style.setProperty("--shk", px + "px");
}

// ---- Test page ----
const $ = (id) => document.getElementById(id);
const baseMsEl = $("baseMs");
const bankPerEventEl = $("bankPerEvent");
const maxBankMsEl = $("maxBankMs");
const eventsEl = $("events");
const comboNumEl = $("combo-num");
const consumerEl = $("consumer-select");
const consumerOut = $("consumer-output");
const tierLabelEl = $("tier-label");
const bankBar = $("bank-bar");
const bankLabel = $("bank-label");

let meter = null;
let bankRaf = null;
let bankMax = 0;

function updateBankBar() {
  if (!meter || meter.combo < 0) {
    bankBar.style.width = "0%";
    bankLabel.textContent = "bank: 0ms";
    bankRaf = null;
    return;
  }
  const remaining = meter.bankRemaining;
  const pct = bankMax > 0 ? (remaining / bankMax) * 100 : 0;
  bankBar.style.width = pct + "%";
  bankLabel.textContent = "bank: " + Math.round(remaining) + "ms";
  if (remaining > 0) {
    bankRaf = requestAnimationFrame(updateBankBar);
  } else {
    bankRaf = null;
  }
}

function startBankAnim() {
  if (bankRaf) cancelAnimationFrame(bankRaf);
  const config = readConfig();
  // estimate max bank for the bar's 100% reference
  const maxCfg = config.maxBankMs > 0 ? config.maxBankMs : config.baseMs + config.bankPerEvent * 10;
  bankMax = Math.max(bankMax, maxCfg, meter.bankRemaining);
  bankRaf = requestAnimationFrame(updateBankBar);
}

function readConfig() {
  return {
    baseMs: Number(baseMsEl.value) || 0,
    bankPerEvent: Number(bankPerEventEl.value) || 0,
    maxBankMs: Number(maxBankMsEl.value) || 0,
  };
}

function rebuild() {
  if (meter) meter.destroy();
  if (bankRaf) cancelAnimationFrame(bankRaf);
  bankRaf = null;
  bankMax = 0;
  eventsEl.innerHTML = "";
  consumerOut.style = "";
  consumerOut.innerHTML = "<span style='color:#555'>pick a consumer</span>";
  tierLabelEl.textContent = "";
  bankBar.style.width = "0%";
  bankLabel.textContent = "bank: 0ms";
  const config = readConfig();
  meter = new Combometer(config);
  comboNumEl.textContent = "0";
  log("new Combometer(" + JSON.stringify(config) + ")", "init");

  // event log observer
  meter.observe((e) => {
    comboNumEl.textContent = String(Math.max(0, meter.combo + 1));
    const isDrop = e.new === -1;
    const label = isDrop ? "DROP" : "TICK";
    log(label + "  previous: " + e.previous + "  new: " + e.new + "  display: " + (e.new + 1) + "  data: " + JSON.stringify(e.data), isDrop ? "drop" : "tick");
    if (isDrop) updateBankBar();
    else startBankAnim();
  });

  // consumer via consume()
  attachConsumer();
}

let detachConsumer = null;

function attachConsumer() {
  if (detachConsumer) { detachConsumer(); detachConsumer = null; }
  const consumer = consumerDefs[consumerEl.value];
  if (consumer && meter) {
    detachConsumer = meter.consume(consumer);
  }
}

consumerEl.addEventListener("change", () => {
  consumerOut.style = "";
  consumerOut.innerHTML = "<span style='color:#555'>pick a consumer</span>";
  tierLabelEl.textContent = "";
  attachConsumer();
});

function log(text, cls) {
  const div = document.createElement("div");
  div.className = "entry " + cls;
  div.textContent = text;
  eventsEl.prepend(div);
}

$("tick-btn").addEventListener("click", () => meter?.tick({}));
$("reset-btn").addEventListener("click", () => meter?.reset());

for (const input of [baseMsEl, bankPerEventEl, maxBankMsEl]) {
  input.addEventListener("change", rebuild);
}

for (const btn of document.querySelectorAll(".preset-btn")) {
  btn.addEventListener("click", () => {
    baseMsEl.value = btn.dataset.base;
    bankPerEventEl.value = btn.dataset.bank;
    maxBankMsEl.value = btn.dataset.max;
    rebuild();
  });
}

rebuild();
</script>

<style>
@keyframes shk {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(calc(-1 * var(--shk))); }
  75% { transform: translateX(var(--shk)); }
}
</style>
</body>
</html>
