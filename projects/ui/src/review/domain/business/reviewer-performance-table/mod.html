<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Reviewer</th>
        <th>Total</th>
        <th>Confirmed</th>
        <th>Flipped</th>
        <th>Accuracy</th>
      </tr>
    </thead>
    <tbody>
      <tr *for="let row of reviewers">
        <td>{{ row.reviewer }}</td>
        <td>{{ row.total }}</td>
        <td>{{ row.confirmed }}</td>
        <td>{{ row.flipped }}</td>
        <td>{{ row.accuracy }}</td>
      </tr>
    </tbody>
  </table>
</div>
