var audioCache = {};
var audioBufferCache = {};
var audioUnlocked = false;

// Use Web Audio API to play files (much more reliable on Safari than Audio element)
function ensureCtxForFile() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

function isExternal(url) {
  return url.indexOf('http://') === 0 || url.indexOf('https://') === 0;
}

function playFile(url) {
  // External URLs (CDN) can't use fetch due to CORS -- use Audio element
  if (isExternal(url)) {
    if (!audioCache[url]) audioCache[url] = new Audio(url);
    var a = audioCache[url];
    a.currentTime = 0;
    a.play().catch(function(e) { console.error('playFile error:', e); });
    return;
  }
  // Local files use Web Audio API (more reliable on Safari)
  var c = ensureCtxForFile();
  if (audioBufferCache[url]) {
    var src = c.createBufferSource();
    src.buffer = audioBufferCache[url];
    src.connect(c.destination);
    src.start(0);
    return;
  }
  fetch(url).then(function(r) { return r.arrayBuffer(); }).then(function(ab) {
    return c.decodeAudioData(ab);
  }).then(function(decoded) {
    audioBufferCache[url] = decoded;
    var src = c.createBufferSource();
    src.buffer = decoded;
    src.connect(c.destination);
    src.start(0);
  }).catch(function(e) { console.error('playFile error:', e); });
}

// ===== Synthesizer helpers =====
var ctx;
function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
function noiseBurst(c, t, dur, freq, vol) {
  var buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  var src = c.createBufferSource(); src.buffer = buf;
  var flt = c.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = freq; flt.Q.value = 2;
  var g = c.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(flt); flt.connect(g); g.connect(c.destination); src.start(t); src.stop(t + dur);
}
function tone(c, t, type, freq, vol, atk, dec) {
  var o = c.createOscillator(); var g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.001, t); g.gain.linearRampToValueAtTime(vol, t + atk);
  g.gain.exponentialRampToValueAtTime(0.001, t + atk + dec);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + atk + dec + 0.01);
}

// Build dropdown
var sel = document.getElementById('pack');
Object.keys(packs).forEach(function(name) {
  var opt = document.createElement('option');
  opt.value = name; opt.textContent = name;
  sel.appendChild(opt);
});

// Build buttons
function buildButtons() {
  var area = document.getElementById('btn-area');
  area.innerHTML = '';
  var pack = packs[sel.value];
  pack.forEach(function(item, i) {
    var btn = document.createElement('button');
    var keyNum = i < 9 ? (i + 1) : null;
    btn.innerHTML = (keyNum ? '<span class="key">' + keyNum + '</span>' : '') + item.label;
    btn.onclick = function() {
      if (typeof item.fn === 'function') item.fn();
      else playFile(item.fn);
    };
    area.appendChild(btn);
  });
}
sel.addEventListener('change', buildButtons);
buildButtons();

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  var n = parseInt(e.key);
  if (n >= 1 && n <= 9) {
    var pack = packs[sel.value];
    var item = pack[n - 1];
    if (item) {
      if (typeof item.fn === 'function') item.fn();
      else playFile(item.fn);
    }
  }
});

// ===== Sound Config Builder =====
var SLOTS = [
  { key: 'ping', label: 'Ping' },
  { key: 'double', label: 'Double Kill' },
  { key: 'triple', label: 'Triple Kill' },
  { key: 'mega', label: 'Mega Kill' },
  { key: 'ultra', label: 'Ultra Kill' },
  { key: 'rampage', label: 'Rampage' },
  { key: 'godlike', label: 'Godlike' },
  { key: 'levelup', label: 'Level Up' },
];

// Short keys for synth packs in exports
var PACK_SHORT_KEYS = {
  'v2 - Synth (noise + filtered)': 'v2',
  'v1 - Synth (raw oscillators)': 'v1',
};

var slotSelects = {};

function buildSlotRows() {
  var container = document.getElementById('slot-rows');
  SLOTS.forEach(function(slot) {
    var row = document.createElement('div');
    row.className = 'slot-row';

    var lbl = document.createElement('label');
    lbl.textContent = slot.label;

    var slotSel = document.createElement('select');
    slotSel.id = 'slot-' + slot.key;
    Object.keys(packs).forEach(function(packName) {
      var group = document.createElement('optgroup');
      group.label = packName;
      packs[packName].forEach(function(sound, idx) {
        var opt = document.createElement('option');
        opt.value = packName + '|' + idx;
        opt.textContent = sound.label;
        group.appendChild(opt);
      });
      slotSel.appendChild(group);
    });

    var previewBtn = document.createElement('button');
    previewBtn.innerHTML = '&#9654;';
    previewBtn.title = 'Preview';
    previewBtn.onclick = function() {
      var val = slotSel.value;
      if (!val) return;
      var parts = val.split('|');
      var packName = parts[0];
      var idx = parseInt(parts[1]);
      var sound = packs[packName][idx];
      if (typeof sound.fn === 'function') sound.fn();
      else playFile(sound.fn);
    };

    row.appendChild(lbl);
    row.appendChild(slotSel);
    row.appendChild(previewBtn);
    container.appendChild(row);
    slotSelects[slot.key] = slotSel;
  });
}
buildSlotRows();

// localStorage helpers
function loadConfigs() {
  try { return JSON.parse(localStorage.getItem('soundConfigs')) || []; }
  catch(e) { return []; }
}
function saveConfigs(configs) {
  localStorage.setItem('soundConfigs', JSON.stringify(configs));
}
function refreshSavedDropdown() {
  var dd = document.getElementById('saved-configs');
  var current = dd.value;
  dd.innerHTML = '<option value="">-- Saved configs --</option>';
  loadConfigs().forEach(function(cfg, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = cfg.name;
    dd.appendChild(opt);
  });
  dd.value = current;
}
refreshSavedDropdown();

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1500);
}

function getCurrentSlotValues() {
  var slots = {};
  SLOTS.forEach(function(slot) {
    var val = slotSelects[slot.key].value;
    var parts = val.split('|');
    slots[slot.key] = { pack: parts[0], index: parseInt(parts[1]) };
  });
  return slots;
}

// Save
document.getElementById('btn-save').onclick = function() {
  var name = document.getElementById('config-name').value.trim();
  if (!name) { showToast('Enter a config name'); return; }
  var configs = loadConfigs();
  var existing = -1;
  configs.forEach(function(c, i) { if (c.name === name) existing = i; });
  var cfg = { name: name, slots: getCurrentSlotValues() };
  if (existing >= 0) configs[existing] = cfg;
  else configs.push(cfg);
  saveConfigs(configs);
  refreshSavedDropdown();
  // select the just-saved config
  var dd = document.getElementById('saved-configs');
  for (var i = 0; i < dd.options.length; i++) {
    if (dd.options[i].textContent === name) { dd.value = dd.options[i].value; break; }
  }
  showToast('Saved!');
};

// Load
document.getElementById('btn-load').onclick = function() {
  var dd = document.getElementById('saved-configs');
  var idx = dd.value;
  if (idx === '') { showToast('Select a config to load'); return; }
  var configs = loadConfigs();
  var cfg = configs[parseInt(idx)];
  if (!cfg) return;
  document.getElementById('config-name').value = cfg.name;
  SLOTS.forEach(function(slot) {
    var mapping = cfg.slots[slot.key];
    if (mapping) {
      slotSelects[slot.key].value = mapping.pack + '|' + mapping.index;
    }
  });
  showToast('Loaded!');
};

// Delete
document.getElementById('btn-delete').onclick = function() {
  var dd = document.getElementById('saved-configs');
  var idx = dd.value;
  if (idx === '') { showToast('Select a config to delete'); return; }
  var configs = loadConfigs();
  configs.splice(parseInt(idx), 1);
  saveConfigs(configs);
  refreshSavedDropdown();
  document.getElementById('config-name').value = '';
  showToast('Deleted!');
};

// Export
document.getElementById('btn-export').onclick = function() {
  var slotValues = getCurrentSlotValues();
  var exported = {};
  SLOTS.forEach(function(slot) {
    var mapping = slotValues[slot.key];
    var sound = packs[mapping.pack][mapping.index];
    if (typeof sound.fn === 'string') {
      exported[slot.key] = sound.fn;
    } else {
      var shortKey = PACK_SHORT_KEYS[mapping.pack] || mapping.pack;
      exported[slot.key] = { pack: shortKey, index: mapping.index };
    }
  });
  var json = JSON.stringify(exported, null, 2);
  navigator.clipboard.writeText(json).then(function() {
    showToast('Copied!');
  }).catch(function() {
    showToast('Copy failed');
  });
};
