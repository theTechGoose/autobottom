<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Total Judged</div>
    <div class="stat-value">{{ totalJudged }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Upheld</div>
    <div class="stat-value" style="color: var(--green)">{{ upheld }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Overturned</div>
    <div class="stat-value" style="color: var(--red)">{{ overturned }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Accuracy</div>
    <div class="stat-value">{{ accuracy }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Time</div>
    <div class="stat-value">{{ avgTime }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Streak</div>
    <div class="stat-value" style="color: var(--yellow)">{{ streak }}</div>
  </div>
</div>
