<div class="charts">
  <div class="chart-panel">
    <div class="chart-title">Pipeline Activity (24h)</div>
    <div class="chart-wrap">
      <canvas #activityCanvas height="140"></canvas>
    </div>
  </div>
  <div class="chart-panel">
    <div class="chart-title">Review Progress</div>
    <div class="donut-wrap">
      <canvas #donutCanvas class="donut-canvas" width="100" height="100"></canvas>
      <div class="donut-legend">
        <div class="donut-item">
          <span class="donut-dot" [style.background]="'var(--yellow)'"></span>
          Pending
          <span class="donut-val">{{reviewPending}}</span>
        </div>
        <div class="donut-item">
          <span class="donut-dot" [style.background]="'var(--green)'"></span>
          Decided
          <span class="donut-val">{{reviewDecided}}</span>
        </div>
      </div>
    </div>
  </div>
</div>
