<div class="stat-row">
  <div class="stat-card blue">
    <div class="stat-label">In Pipeline</div>
    <div class="stat-value">{{inPipeline}}</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">Completed (24h)</div>
    <div class="stat-value">{{completed24h}}</div>
  </div>
  <div class="stat-card red">
    <div class="stat-label">Errors (24h)</div>
    <div class="stat-value">{{errors24h}}</div>
  </div>
  <div class="stat-card yellow">
    <div class="stat-label">Retries (24h)</div>
    <div class="stat-value">{{retries24h}}</div>
  </div>
</div>
