        - article [ref=e87]:
          - generic [ref=e89]:
            - heading "Disability" [level=1] [ref=e90]
            - paragraph [ref=e92]: Social Security Disability Insurance (SSDI) or “Disability” provides monthly payments to people who have a disability that stops or limits their ability to work.
            - generic [ref=e95]:
              - heading [level=2]
              - link "Learn how to apply" [ref=e97] [cursor=pointer]:
                - /url: /apply?benefits=disability&age=adult
            - generic [ref=e99]:
              - heading [level=2]
              - generic [ref=e100]:
                - generic [ref=e102]:
                  - heading "Who can get Disability" [level=2] [ref=e103]
                  - generic [ref=e104]:
                    - paragraph [ref=e105]: "Individuals may be eligible for Disability if they have:"
                    - list [ref=e106]:
                      - listitem [ref=e107]:
                        - text: A disability or blindness,
                        - strong [ref=e108]: and
                      - listitem [ref=e109]: Enough work history.
                    - paragraph [ref=e110]:
                      - link "See if you might be eligible for Disability" [ref=e111] [cursor=pointer]:
                        - /url: /disability/eligibility
                - generic [ref=e113]:
                  - heading "What you could get" [level=2] [ref=e114]
                  - generic [ref=e115]:
                    - paragraph [ref=e116]: Your benefits may include a monthly payment and Medicare. Your payment amount is based on your work history before your disability began.
                    - paragraph [ref=e117]:
                      - link "See what you could get from Disability" [ref=e118] [cursor=pointer]:
                        - /url: /disability/amount
                - generic [ref=e120]:
                  - heading "Try returning to work without losing Disability" [level=2] [ref=e121]
                  - generic [ref=e122]:
                    - paragraph [ref=e123]: You may be able to return to work or continue working without losing your Disability benefits.
                    - paragraph [ref=e124]:
                      - link "Learn about returning to work" [ref=e125] [cursor=pointer]:
                        - /url: /disability/work
                - generic [ref=e127]:
                  - heading "What you need to report" [level=2] [ref=e128]
                  - generic [ref=e129]:
                    - paragraph [ref=e130]: Once you’re approved for Disability, you must report changes to your work, income, and personal information.
                    - paragraph [ref=e131]:
                      - link "See what you need to report" [ref=e132] [cursor=pointer]:
                        - /url: /disability/reporting
                - generic [ref=e134]:
                  - heading "What to do during a Disability review" [level=2] [ref=e135]
                  - generic [ref=e136]:
                    - paragraph [ref=e137]: We sometimes check to see if you still have a disability. You must fill out a report to help us complete the review.
                    - paragraph [ref=e138]:
                      - link "Learn how to submit your report" [ref=e139] [cursor=pointer]:
                        - /url: /disability/review
                - generic [ref=e141]:
                  - heading "Get Disability back if your benefit ended" [level=2] [ref=e142]
                  - generic [ref=e143]:
                    - paragraph [ref=e144]: If your Disability benefit ended, you might be able to restart it later.
                    - paragraph [ref=e145]:
                      - link "Learn how to restart your benefit" [ref=e146] [cursor=pointer]:
                        - /url: /disability/restart
