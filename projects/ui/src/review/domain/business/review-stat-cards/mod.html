<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Total Reviewed</div>
    <div class="stat-value">{{ totalReviewed }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Confirmed</div>
    <div class="stat-value" style="color: var(--green)">{{ confirmed }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Flipped</div>
    <div class="stat-value" style="color: var(--red)">{{ flipped }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Accuracy</div>
    <div class="stat-value">{{ accuracy }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Time</div>
    <div class="stat-value">{{ avgTime }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Streak</div>
    <div class="stat-value" style="color: var(--yellow)">{{ streak }}</div>
  </div>
</div>
